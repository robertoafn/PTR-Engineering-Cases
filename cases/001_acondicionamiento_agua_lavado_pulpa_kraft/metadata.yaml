case_id: 001_acondicionamiento_agua_lavado_pulpa_kraft
title: Acondicionamiento de agua para lavado de pulpa Kraft
phenomenon: Transporte de cantidad de movimiento en una bomba centrífuga y transferencia
  de energía sensible en un calentador, en régimen estacionario.
objective: Determinar la potencia de bombeo y la carga térmica requeridas para acondicionar
  10 kg/s de agua desde 303.15 K y 300000 Pa hasta 343.15 K y 580000 Pa.
