validation:
  strategy: Balance global de masa y energía, verificación de rangos físicos, comparación
    de potencia de bomba con V_dot*DeltaP/eta, comparación de carga térmica con m_dot*Cp*DeltaT
    y reapertura, resolución e inspección visual del archivo versionado por el autor en DWSIM 9.0.5.
  acceptance_criteria: Residuo de masa <= 0.01%; residuo de energía <= 0.1%; desviación
    de cálculos independientes <= 1%; estado líquido en las tres corrientes; topología y
    resultados principales concordantes durante la validación manual del autor.
