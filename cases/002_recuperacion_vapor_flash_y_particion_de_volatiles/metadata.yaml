    unit: dimensionless
    source_type: simulated
  - name: factor_enriquecimiento_metanol_vapor_liquido
    value: 6.383981410295
    unit: dimensionless
    source_type: simulated
  - name: coeficiente_determinacion_calibracion_gc_fid
    value: 0.999971130804
    unit: dimensionless
    source_type: synthetic
  - name: diferencia_duplicado_area
    value: 0.02474822525728
    unit: dimensionless
