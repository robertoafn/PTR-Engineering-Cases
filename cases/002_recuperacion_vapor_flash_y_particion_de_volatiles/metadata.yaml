case_id: 002_recuperacion_vapor_flash_y_particion_de_volatiles
title: Recuperación de vapor flash y partición de compuestos volátiles
phenomenon: Expansión isoentálpica, equilibrio vapor-líquido y separación flash de una mezcla sintética agua-metanol en régimen estacionario.
objective: Determinar la producción de vapor secundario tras expandir un condensado caliente sintético y cuantificar la partición de metanol entre las fases vapor y líquida mediante simulación DWSIM y evidencia cromatográfica sintética.
authors:
  - name: Roberto Flores
    email: roberto.flores.n1987@gmail.com
created_at: '2026-07-18T00:00:00Z'
version: 0.1.0
license_code: MIT
license_docs: CC-BY-4.0
software_stack:
  - name: DWSIM
    version: 9.0.5
    license: GPL-3.0
    purpose: Simulación estacionaria de válvula y separador flash con NRTL.
  - name: OpenChrom
    version: 1.6.14
    license: EPL-2.0
    purpose: Importación, revisión visual y detección del pico cromatográfico sintético.
  - name: Python
    version: 3.13.5
    license: PSF
    purpose: Normalización de resultados y reconstrucción externa de área trapezoidal.
