qc_rules:
  - schema
  - units
  - completeness
  - range
  - naming
  - referential_integrity
  - checksum
validation:
  strategy: Balance global y por componente de la simulación, verificación de isoentalpía de la válvula, inspección del flowsheet, calibración cromatográfica sintética y comparación del duplicado. Las áreas se reconstruyen externamente por trapecios porque OpenChrom 1.6.14 no entregó un área distinta de cero para el cromatograma FID importado.
  acceptance_criteria: Residuo de masa <= 0.01%; residuo de metanol <= 0.05%; fracción de vapor entre 0 y 1; enriquecimiento de metanol en vapor > 1; R2 de calibración >= 0.995; diferencia de duplicado <= 10%.
