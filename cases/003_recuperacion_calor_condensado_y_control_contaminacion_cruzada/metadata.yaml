validation:
  strategy: Balances de materia y energía en el intercambiador; validación del balance entálpico de cada corriente; réplica analítica aproximada de la carga térmica mediante la ecuación de diseño Q = U * A * F * LMTD; y comprobación del diferencial de presión para la prevención de la contaminación cruzada.
  acceptance_criteria: Error en balance de masa en cada lado de 0.0%; residuo en balance de energía <= 0.1% respecto a la carga térmica total; desviación en la réplica analítica de LMTD <= 1.0%; y verificación de que el diferencial de presión P_frio - P_caliente sea >= 0 Pa para minimizar la fuerza impulsora de fuga del condensado contaminado con metanol.
