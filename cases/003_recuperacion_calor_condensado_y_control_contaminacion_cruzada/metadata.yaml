case_id: 003_recuperacion_calor_condensado_y_control_contaminacion_cruzada
title: Recuperación de calor de condensado y control de contaminación cruzada
phenomenon: Transferencia de calor sensible entre condensado de vapor industrial (corriente caliente con trazas de metanol) y agua de proceso (corriente fría limpia) en un intercambiador de calor de carcasa y tubos en régimen estacionario, analizando el riesgo de contaminación cruzada por fugas físicas.
objective: Determinar la carga térmica del intercambiador HX-301, la temperatura de salida del condensado y verificar que la presión en el lado frío (limpio) es igual o superior al lado caliente para prevenir fugas contaminantes del trazador metanol hacia el agua limpia en caso de falla de integridad mecánica.
