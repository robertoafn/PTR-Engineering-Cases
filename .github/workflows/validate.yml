name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enforce naming conventions
        run: python scripts/enforce_naming.py

      - name: Validate metadata (all cases)
        run: python scripts/validate_metadata.py cases/

      - name: Validate tables
        run: python scripts/validate_tables.py data/processed/

      - name: Unit consistency check
        run: python scripts/unit_consistency_check.py cases/

      - name: Verify checksums
        run: python scripts/compute_checksums.py --verify cases/

      - name: Run unit tests
        run: pytest tests/ -q
