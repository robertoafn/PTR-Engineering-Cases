name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install governance dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Enforce naming conventions
        run: python scripts/enforce_naming.py

      - name: Validate metadata for all cases
        run: python scripts/validate_metadata.py cases/

      - name: Validate datasets for all cases
        run: python scripts/validate_tables.py cases/

      - name: Check unit consistency
        run: python scripts/unit_consistency_check.py cases/

      - name: Verify case checksums
        run: python scripts/compute_checksums.py --verify cases/

      - name: Run regression tests
        run: pytest tests/ -q
